kind = "web"
previewPath = "/"
title = "EcoInk Lab"
version = "1.0.0"
id = "artifacts/ecoink-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20380

[services.development]
run = "pnpm --filter @workspace/ecoink-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ecoink-lab", "run", "build" ]
publicDir = "artifacts/ecoink-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20380"
BASE_PATH = "/"
